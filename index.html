<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CR7 - The Legend</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
}

/* Background */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('cr7.jpg') no-repeat center top / cover;
    animation: zoomBg 10s infinite alternate;
    filter: brightness(0.7);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.content {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TITLE */
h1 {
    font-size: 80px;
    letter-spacing: 6px;
    text-transform: uppercase;
    display: flex;
    gap: 20px;
    margin-bottom: 40px;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

.legend {
    color: #00ff88;
    animation: glowGreen 2s infinite alternate;
}

.cr7 {
    color: red;
    animation: glowRed 2s infinite alternate;
}

/* BUTTON AS LOGO */
.enter-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 2s;
    transition: transform 0.3s, box-shadow 0.3s;
}

.enter-btn img {
    width: 120px; /* taille du logo */
    height: auto;
    background: transparent;
    filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3));
}

.enter-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px red;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 12px;
    opacity: 0.7;
}

/* Animations */
@keyframes fadeIn {
    0% {
        opacity: 0;
        transform: translateY(60px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes glowGreen {
    0% { text-shadow: 0 0 10px #00ff88; }
    100% { text-shadow: 0 0 30px #00ff88; }
}

@keyframes glowRed {
    0% { text-shadow: 0 0 10px red; }
    100% { text-shadow: 0 0 30px red; }
}

@keyframes zoomBg {
    0% { transform: scale(1); }
    100% { transform: scale(1.08); }
}

/* Fade out transition */
.fade-out {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: scale(1.1);
    }
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="content" id="mainContent">
    <h1>
        <span class="legend">THE LEGEND</span>
        <span class="cr7">CR7</span>
    </h1>

    <!-- Bouton remplacé par le logo -->
    <button class="enter-btn" onclick="goNext()">
        <img src="portugal_logo.png" style="background: none;">
    </button>
</div>

<div class="footer">
    made by yvvvsssssen
</div>

<script>
function goNext() {
    document.getElementById("mainContent").classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "page2.html";
    }, 800);
}
</script>

</body>
</html>
