<title>Crédits</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  overflow:hidden;
}

/* TEXTE QUI MONTE */
.credits{
  position:absolute;
  bottom:-100%;
  width:100%;
  text-align:center;
  font-size:24px;
  animation:scroll 15s linear forwards;
}

@keyframes scroll{
  from{bottom:-100%;}
  to{bottom:100%;}
}

h1{
  color:gold;
}

.final{
  margin-top:50px;
  font-size:30px;
  color:red;
  animation:flash 1s infinite;
}

@keyframes flash{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}
</style>

</head>
